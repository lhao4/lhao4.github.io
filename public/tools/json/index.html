  <div class="tool-body"><div>
  <div class="tool-row">
    <button class="tool-btn" onclick="formatJSON()">格式化</button>

    <span id="jsonStatus" style="font-size:0.85rem;"></span>
  </div>

    <div>

    </div>
    <div>
      <div class="tool-label">结果 <span id="jsonCopyTip" style="color:#38a169;font-size:0.8rem;"></span></div>

    </div>
  </div>

<script>
function formatJSON() {
  const status = document.getElementById('jsonStatus');
  try {
    const obj = JSON.parse(document.getElementById('jsonInput').value);
    document.getElementById('jsonOutput').value = JSON.stringify(obj, null, 2);
    status.style.color = '#38a169';
    status.textContent = '✓ 合法 JSON';
  } catch(e) {
    status.style.color = '#e53e3e';
    status.textContent = '✗ ' + e.message;
    document.getElementById('jsonOutput').value = '';
  }
}
function compressJSON() {
  const status = document.getElementById('jsonStatus');
  try {
    const obj = JSON.parse(document.getElementById('jsonInput').value);
    document.getElementById('jsonOutput').value = JSON.stringify(obj);
    status.style.color = '#38a169';
    status.textContent = '✓ 压缩成功';
  } catch(e) {
    status.style.color = '#e53e3e';
    status.textContent = '✗ ' + e.message;
  }
}
function clearJSON() {
  document.getElementById('jsonInput').value = '';
  document.getElementById('jsonOutput').value = '';
  document.getElementById('jsonStatus').textContent = '';
}
function copyJSON() {
  const val = document.getElementById('jsonOutput').value;
  if (!val) return;
  navigator.clipboard.writeText(val).then(() => {
    const tip = document.getElementById('jsonCopyTip');
    tip.textContent = '已复制';
    setTimeout(() => tip.textContent = '', 2000);
  });
}
</script>

<script>

(function() {
  const bar = document.getElementById('read-progress');
  function update() {
    const scrollTop = window.scrollY;
    const docHeight = document.documentElement.scrollHeight - window.innerHeight;
    bar.style.width = (docHeight > 0 ? (scrollTop / docHeight) * 100 : 0) + '%';
  }
  window.addEventListener('scroll', update, { passive: true });
})();


(function() {
  const sidebar = document.getElementById('toc-sidebar');
  const tocEl = document.querySelector('.post-single #TableOfContents');
  if (!tocEl || !sidebar) return;

  sidebar.innerHTML = tocEl.innerHTML;
  tocEl.parentElement.style.display = 'none';

  
  const links = [...sidebar.querySelectorAll('a')];
  const headings = links.map(a => {
    try { return document.getElementById(decodeURIComponent(a.hash.slice(1))); } catch(e) { return null; }
  }).filter(Boolean);

  function onScroll() {
    let cur = -1;
    const offset = 80;
    for (let i = 0; i < headings.length; i++) {
      if (headings[i].getBoundingClientRect().top <= offset) cur = i;
    }
    links.forEach((a, i) => a.classList.toggle('toc-active', i === cur));
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  onScroll();
})();
</script>

                document.querySelector(`[id='${decodeURIComponent(id)}']`).scrollIntoView();
            }
            if (id === "top") {
                history.replaceState(null, null, " ");
            } else {
                history.pushState(null, null, `#${id}`);
            }
        });
    });

<script>
    document.querySelectorAll('pre > code').forEach((codeblock) => {
        const container = codeblock.parentNode.parentNode;

        const copybutton = document.createElement('button');
        copybutton.classList.add('copy-code');
        copybutton.innerHTML = 'copy';

        function copyingDone() {
            copybutton.innerHTML = 'copied!';
            setTimeout(() => {
                copybutton.innerHTML = 'copy';
            }, 2000);
        }

        copybutton.addEventListener('click', (cb) => {
            if ('clipboard' in navigator) {
                navigator.clipboard.writeText(codeblock.textContent);
                copyingDone();
                return;
            }

            const range = document.createRange();
            range.selectNodeContents(codeblock);
            const selection = window.getSelection();
            selection.removeAllRanges();
            selection.addRange(range);
            try {
                document.execCommand('copy');
                copyingDone();
            } catch (e) { };
            selection.removeRange(range);
        });

        if (container.classList.contains("highlight")) {
            container.appendChild(copybutton);
        } else if (container.parentNode.firstChild == container) {
            
        } else if (codeblock.parentNode.parentNode.parentNode.parentNode.parentNode.nodeName == "TABLE") {
            
            codeblock.parentNode.parentNode.parentNode.parentNode.parentNode.appendChild(copybutton);
        } else {
            
            codeblock.parentNode.appendChild(copybutton);
        }
    });
</script>
