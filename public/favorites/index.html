<script>
function loadFavs() {
  const favs = JSON.parse(localStorage.getItem('haonest-favs') || '[]');
  const list = document.getElementById('fav-list');
  const empty = document.getElementById('fav-empty');
  if (favs.length === 0) {
    empty.style.display = 'block';
    list.innerHTML = '';
    return;
  }
  empty.style.display = 'none';
  list.innerHTML = favs.map((f, i) => `
    <div class="fav-item">
      <a href="${f.url}">
        <div class="fav-item-title">${f.title}</div>
        <div class="fav-item-meta">收藏于 ${f.date}</div>
      </a>
      <button class="fav-del-btn" onclick="removeFav(${i})" title="取消收藏">✕</button>
    </div>
  `).join('');
}
function removeFav(i) {
  const favs = JSON.parse(localStorage.getItem('haonest-favs') || '[]');
  favs.splice(i, 1);
  localStorage.setItem('haonest-favs', JSON.stringify(favs));
  loadFavs();
}
function clearAllFavs() {
  if (confirm('确定清空所有收藏？')) {
    localStorage.removeItem('haonest-favs');
    loadFavs();
  }
}
loadFavs();
</script>

<script>

(function() {
  const bar = document.getElementById('read-progress');
  function update() {
    const scrollTop = window.scrollY;
    const docHeight = document.documentElement.scrollHeight - window.innerHeight;
    bar.style.width = (docHeight > 0 ? (scrollTop / docHeight) * 100 : 0) + '%';
  }
  window.addEventListener('scroll', update, { passive: true });
})();


(function() {
  const sidebar = document.getElementById('toc-sidebar');
  const tocEl = document.querySelector('.post-single #TableOfContents');
  if (!tocEl || !sidebar) return;

  sidebar.innerHTML = tocEl.innerHTML;
  tocEl.parentElement.style.display = 'none';

  
  const links = [...sidebar.querySelectorAll('a')];
  const headings = links.map(a => {
    try { return document.getElementById(decodeURIComponent(a.hash.slice(1))); } catch(e) { return null; }
  }).filter(Boolean);

  function onScroll() {
    let cur = -1;
    const offset = 80;
    for (let i = 0; i < headings.length; i++) {
      if (headings[i].getBoundingClientRect().top <= offset) cur = i;
    }
    links.forEach((a, i) => a.classList.toggle('toc-active', i === cur));
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  onScroll();
})();
</script>


<script>
    let menu = document.getElementById('menu');

        const scrollPosition = localStorage.getItem("menu-scroll-position");
        if (scrollPosition) {
            menu.scrollLeft = parseInt(scrollPosition, 10);
        }
        
        menu.onscroll = function () {
            localStorage.setItem("menu-scroll-position", menu.scrollLeft);
        }
    }

    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
        anchor.addEventListener("click", function (e) {
            e.preventDefault();
            var id = this.getAttribute("href").substr(1);
            if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
                document.querySelector(`[id='${decodeURIComponent(id)}']`).scrollIntoView({
                    behavior: "smooth"
                });
            } else {
                document.querySelector(`[id='${decodeURIComponent(id)}']`).scrollIntoView();
            }
            if (id === "top") {
                history.replaceState(null, null, " ");
            } else {
                history.pushState(null, null, `#${id}`);
            }
        });
    });

</script>

<script>
    document.querySelectorAll('pre > code').forEach((codeblock) => {
        const container = codeblock.parentNode.parentNode;

        const copybutton = document.createElement('button');
        copybutton.classList.add('copy-code');
        copybutton.innerHTML = 'copy';

        function copyingDone() {
            copybutton.innerHTML = 'copied!';
            setTimeout(() => {
                copybutton.innerHTML = 'copy';
            }, 2000);
        }

        copybutton.addEventListener('click', (cb) => {
            if ('clipboard' in navigator) {
                navigator.clipboard.writeText(codeblock.textContent);
                copyingDone();
                return;
            }

            const range = document.createRange();
            range.selectNodeContents(codeblock);
            const selection = window.getSelection();
            selection.removeAllRanges();
            selection.addRange(range);
            try {
                document.execCommand('copy');
                copyingDone();
            } catch (e) { };
